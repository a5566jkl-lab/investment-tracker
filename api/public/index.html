<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資追蹤</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #111; }
.header { background: #fff; border-bottom: 1px solid #eee; padding: 1rem 1.25rem 0; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 18px; font-weight: 600; }
.header-sub { font-size: 13px; color: #888; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; }
.dot.live { background: #1D9E75; }
.dot.err { background: #D85A30; }
.tabs { display: flex; margin-top: 0.75rem; }
.tab { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #111; border-bottom: 2px solid #111; font-weight: 500; }
.section { padding: 1rem 1.25rem 0; max-width: 480px; margin: 0 auto; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.metric { background: #fff; border-radius: 10px; padding: 0.85rem 1rem; border: 1px solid #eee; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 19px; font-weight: 600; }
.card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.card-title { font-size: 13px; color: #888; margin-bottom: 10px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
.row:last-child { border-bottom: none; }
.rl { font-size: 14px; color: #666; }
.rv { font-size: 14px; font-weight: 500; }
.pos { color: #1D9E75; }
.neg { color: #D85A30; }
.warn { color: #BA7517; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.ba { background: #FAEEDA; color: #854F0B; }
.bg { background: #EAF3DE; color: #3B6D11; }
.stock-card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.sg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 0; border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 8px; }
.sl { font-size: 11px; color: #888; }
.sv { font-size: 13px; font-weight: 500; }
.bar-wrap { margin-bottom: 0.75rem; background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 1rem 1.25rem; }
.bar-track { height: 8px; background: #f0f0f0; border-radius: 4px; position: relative; margin: 10px 0 4px; }
.bar-fill { height: 100%; border-radius: 4px; background: #EF9F27; transition: width 0.4s; }
.bar-mid { position: absolute; top: -4px; left: 50%; width: 2px; height: 16px; background: #ccc; }
.bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; }
.total-footer { background: #f8f8f8; margin: 0.5rem -1.25rem -1rem; padding: 10px 1.25rem; border-radius: 0 0 12px 12px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">我的投資總覽</div>
  <div class="header-sub">
    <span class="dot" id="dot"></span>
    <span id="status">載入中...</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('overview')">總覽</div>
    <div class="tab" onclick="showTab('stocks')">持股</div>
    <div class="tab" onclick="showTab('loan')">信貸</div>
  </div>
</div>
